<!DOCTYPE html>
<html>
<head>
  <title>Supermart</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }

    header {
      background: #00b386;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .box {
      width: 320px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 10px #ccc;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 8px 15px;
      margin: 5px;
      background: #00b386;
      color: white;
      border: none;
      cursor: pointer;
    }

    .link {
      color: blue;
      cursor: pointer;
      font-size: 14px;
    }

    .hidden { display: none; }

    .products {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>🛒 Supermart</header>

<!-- REGISTER -->
<div id="registerBox" class="box">
  <h3>Register</h3>
  <input id="rname" placeholder="Name"><br>
  <input id="remail" placeholder="Email"><br>
  <input id="rpass" type="password" placeholder="Password"><br>

  <button onclick="register()">Register</button>

  <p class="link" onclick="showLogin()">Already have account? Login</p>
</div>

<!-- LOGIN -->
<div id="loginBox" class="box hidden">
  <h3>Login</h3>
  <input id="lemail" placeholder="Email"><br>
  <input id="lpass" type="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>

  <p class="link" onclick="showRegister()">New user? Register</p>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden box">
  <h3>Admin Panel</h3>
  <input id="pname" placeholder="Product Name"><br>
  <input id="pprice" placeholder="Price"><br>
  <button onclick="addProduct()">Add Product</button>
</div>

<!-- SHOP -->
<div id="shop" class="hidden">
  <h2 style="text-align:center;">Products</h2>
  <div class="products" id="products"></div>
</div>

<script>

const BASE = "https://supermart-store.onrender.com/api";
let token = "";

// SWITCH UI
function showLogin() {
  registerBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
}

function showRegister() {
  loginBox.classList.add("hidden");
  registerBox.classList.remove("hidden");
}

// REGISTER
async function register() {
  await fetch(BASE+"/auth/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:rname.value,
      email:remail.value,
      password:rpass.value
    })
  });

  alert("Registered! Now login");
  showLogin(); // 🔥 auto switch
}

// LOGIN
async function login() {
  const res = await fetch(BASE+"/auth/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:lemail.value,
      password:lpass.value
    })
  });

  const data = await res.json();
  token = data.token;

  const payload = JSON.parse(atob(token.split('.')[1]));

  loginBox.classList.add("hidden");

  if(payload.role === "admin") {
    adminPanel.classList.remove("hidden");
  } else {
    shop.classList.remove("hidden");
    loadProducts();
  }
}

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(BASE+"/products");
  const data = await res.json();

  products.innerHTML = "";

  data.forEach(p => {
    products.innerHTML += `
      <div class="card">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
      </div>
    `;
  });
}

// ADD PRODUCT
async function addProduct() {
  await fetch(BASE+"/products", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
      name:pname.value,
      price:pprice.value
    })
  });

  alert("Product added");
}

</script>

</body>
</html>
