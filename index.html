<!DOCTYPE html>
<html>
<head>
  <title>Supermart</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f8f8f8;
    }

    header {
      background: #00b386;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      display: flex;
    }

    .products {
      width: 70%;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
    }

    .card button {
      margin-top: 5px;
      padding: 5px 10px;
      background: #00b386;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .cart {
      width: 30%;
      background: white;
      padding: 20px;
      border-left: 2px solid #eee;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    .auth {
      padding: 10px;
      text-align: center;
    }

    input {
      margin: 5px;
      padding: 5px;
    }
  </style>
</head>

<body>

<header>🛒 Supermart Store</header>

<div class="auth">
  <input id="email" placeholder="Email">
  <input id="password" placeholder="Password" type="password">
  <button onclick="login()">Login</button>
</div>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart">
    <h3>Cart</h3>
    <div id="cart"></div>
    <p>Total: ₹<span id="total">0</span></p>
  </div>

</div>

<script>

const API = "https://supermart-store.onrender.com/api/products";

let cart = [];
let token = "";

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("https://supermart-store.onrender.com/api/auth/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  token = data.token;

  alert("Login successful");
}

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("products");
  container.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://via.placeholder.com/150">
      <h4>${p.name}</h4>
      <p>₹${p.price}</p>
      <button onclick='addToCart(${JSON.stringify(p)})'>Add</button>
    `;

    container.appendChild(div);
  });
}

// CART
function addToCart(p) {
  cart.push(p);
  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";

  let total = 0;

  cart.forEach((item, i) => {
    total += item.price;

    cartDiv.innerHTML += `
      <div class="cart-item">
        ${item.name}
        <button onclick="remove(${i})">❌</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function remove(i) {
  cart.splice(i,1);
  renderCart();
}

// INIT
loadProducts();

</script>

</body>
</html>
