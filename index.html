<!DOCTYPE html>
<html>
<head>
  <title>Supermart</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .products, .cart {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 50%;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .product {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
    }

    button {
      padding: 5px 10px;
      cursor: pointer;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      margin: 5px 0;
    }

    .total {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🛒 Supermart Store</h1>

<div class="container">

  <!-- PRODUCTS -->
  <div class="products">
    <h2>Products</h2>
    <button onclick="loadProducts()">Load Products</button>
    <div id="productsList"></div>
  </div>

  <!-- CART -->
  <div class="cart">
    <h2>Cart</h2>
    <div id="cartList"></div>
    <p class="total">Total: ₹<span id="total">0</span></p>
    <button onclick="clearCart()">Clear Cart</button>
  </div>

</div>

<script>

const API = "https://supermart-store.onrender.com/api/products";

let cart = [];

async function loadProducts() {
  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("productsList");
  container.innerHTML = "";

  data.forEach(p => {
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <span>${p.name} - ₹${p.price}</span>
      <button onclick='addToCart(${JSON.stringify(p)})'>Add</button>
    `;

    container.appendChild(div);
  });
}

function addToCart(product) {
  cart.push(product);
  renderCart();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  renderCart();
}

function clearCart() {
  cart = [];
  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cartList");
  cartDiv.innerHTML = "";

  let total = 0;

  cart.forEach((item, index) => {
    total += item.price;

    const div = document.createElement("div");
    div.className = "cart-item";

    div.innerHTML = `
      <span>${item.name}</span>
      <button onclick="removeFromCart(${index})">❌</button>
    `;

    cartDiv.appendChild(div);
  });

  document.getElementById("total").innerText = total;
}

</script>

</body>
</html>
