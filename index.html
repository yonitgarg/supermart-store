<!DOCTYPE html>
<html>
<head>
  <title>Supermart</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0aad0a;
      color: white;
      padding: 15px;
    }

    .cart {
      cursor: pointer;
      font-size: 18px;
    }

    /* AUTH BOX */
    .box {
      width: 300px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 5px;
    }

    button {
      background: #0aad0a;
      color: white;
      border: none;
      padding: 8px;
      margin-top: 10px;
      cursor: pointer;
    }

    .hidden { display: none; }

    /* PRODUCTS GRID */
    .products {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    .cartBox {
      position: fixed;
      right: 0;
      top: 0;
      width: 300px;
      height: 100%;
      background: white;
      padding: 10px;
      box-shadow: -2px 0 10px gray;
      display: none;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>🛒 Supermart</h2>
  <div class="cart" onclick="toggleCart()">🛍 Cart (<span id="count">0</span>)</div>
</div>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>Login</h3>
  <input id="lemail" placeholder="Email"><br>
  <input id="lpass" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- PRODUCTS -->
<div id="shop" class="hidden">
  <div class="products" id="products"></div>
</div>

<!-- CART -->
<div id="cartBox" class="cartBox">
  <h3>Cart</h3>
  <ul id="cartItems"></ul>
</div>

<script>

const BASE = "https://supermart-store.onrender.com/api";
let token = "";
let cart = [];

// LOGIN
async function login() {
  const res = await fetch(BASE+"/auth/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:lemail.value,
      password:lpass.value
    })
  });

  const data = await res.json();

  if (!data.token) {
    alert("Login failed");
    return;
  }

  token = data.token;

  loginBox.classList.add("hidden");
  shop.classList.remove("hidden");

  loadProducts();
}

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(BASE+"/products");
  const data = await res.json();

  products.innerHTML = "";

  data.forEach(p => {
    products.innerHTML += `
      <div class="card">
        <img src="https://via.placeholder.com/150">
        <h4>${p.name}</h4>
        <p class="price">₹${p.price}</p>
        <button onclick='addToCart(${JSON.stringify(p)})'>Add to Cart</button>
      </div>
    `;
  });
}

// ADD TO CART
function addToCart(p) {
  cart.push(p);
  document.getElementById("count").innerText = cart.length;

  renderCart();
}

// SHOW CART
function toggleCart() {
  cartBox.style.display = cartBox.style.display === "block" ? "none" : "block";
}

// RENDER CART
function renderCart() {
  cartItems.innerHTML = "";

  cart.forEach(item => {
    cartItems.innerHTML += `<li>${item.name} - ₹${item.price}</li>`;
  });
}

</script>

</body>
</html>
