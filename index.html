<!DOCTYPE html>
<html>
<head>
  <title>Supermart</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; }
    .container { text-align:center; margin-top:50px; }
    input { margin:5px; padding:8px; }
    button { padding:8px 15px; cursor:pointer; }
    .hidden { display:none; }

    .products { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
    .card {
      background:white; padding:10px; width:150px;
      border-radius:10px; box-shadow:0 0 5px #ccc;
    }
  </style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="container">
  <h2>Login / Register</h2>

  <input id="name" placeholder="Name"><br>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden container">
  <h2>Admin Panel</h2>

  <input id="pname" placeholder="Product Name"><br>
  <input id="pprice" placeholder="Price"><br>

  <button onclick="addProduct()">Add Product</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- USER SHOP -->
<div id="shop" class="hidden">
  <h2 style="text-align:center;">Products</h2>

  <div class="products" id="products"></div>

  <h3 style="text-align:center;">Cart</h3>
  <div id="cart" style="text-align:center;"></div>

  <button onclick="logout()">Logout</button>
</div>

<script>

const BASE = "https://supermart-store.onrender.com/api";
let token = "";
let cart = [];
let isAdmin = false;

// REGISTER
async function register() {
  await fetch(BASE + "/auth/register", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name: name.value,
      email: email.value,
      password: password.value
    })
  });

  alert("Registered");
}

// LOGIN
async function login() {
  const res = await fetch(BASE + "/auth/login", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  token = data.token;

  // decode role
  const payload = JSON.parse(atob(token.split('.')[1]));
  isAdmin = payload.role === "admin";

  document.getElementById("auth").classList.add("hidden");

  if(isAdmin) {
    document.getElementById("adminPanel").classList.remove("hidden");
  } else {
    document.getElementById("shop").classList.remove("hidden");
    loadProducts();
  }
}

// ADD PRODUCT (ADMIN)
async function addProduct() {
  await fetch(BASE + "/products", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body:JSON.stringify({
      name: pname.value,
      price: pprice.value
    })
  });

  alert("Product added");
}

// LOAD PRODUCTS
async function loadProducts() {
  const res = await fetch(BASE + "/products");
  const data = await res.json();

  const div = document.getElementById("products");
  div.innerHTML = "";

  data.forEach(p => {
    div.innerHTML += `
      <div class="card">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick='addCart(${JSON.stringify(p)})'>Add</button>
      </div>
    `;
  });
}

// CART
function addCart(p) {
  cart.push(p);
  renderCart();
}

function renderCart() {
  let html = "";
  cart.forEach(c => html += `<p>${c.name}</p>`);
  document.getElementById("cart").innerHTML = html;
}

// LOGOUT
function logout() {
  location.reload();
}

</script>

</body>
</html>
